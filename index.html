<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary SEO -->
    <title>myICDCode.com — ICD-10-CM Code Lookup, Plain English</title>
    <meta name="description" content="Free ICD-10-CM diagnosis code lookup. Search 98,000+ codes with plain English explanations. FY 2026 current — updated annually from CMS and CDC." />
    <meta name="keywords" content="ICD-10, ICD-10-CM, ICD 10 codes, diagnosis codes, medical codes, ICD code lookup, medical billing codes, ICD-10 code search, what does ICD code mean, EOB diagnosis code" />
    <meta name="author" content="StormGlass Interactive Inc." />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://myicdcode.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://myicdcode.com/" />
    <meta property="og:site_name" content="myICDCode.com" />
    <meta property="og:title" content="myICDCode.com — ICD-10-CM Code Lookup, Plain English" />
    <meta property="og:description" content="Search 98,000+ ICD-10-CM diagnosis codes explained in plain English. Free, fast, FY 2026 current. Perfect for patients reading EOBs and medical coders." />
    <meta property="og:image" content="https://myicdcode.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@myICDCode" />
    <meta name="twitter:title" content="myICDCode.com — ICD-10 Code Lookup" />
    <meta name="twitter:description" content="Search 98,000+ ICD-10-CM diagnosis codes in plain English. Free, FY 2026 current." />
    <meta name="twitter:image" content="https://myicdcode.com/og-image.png" />

    <!-- Mobile / PWA -->
    <meta name="theme-color" content="#0A1628" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="myICDCode" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- JSON-LD: WebSite with SearchAction (Google Sitelinks Searchbox) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "myICDCode.com",
      "alternateName": "myICDCode",
      "url": "https://myicdcode.com",
      "description": "Free ICD-10-CM diagnosis code lookup with plain English explanations. 98,000+ codes, FY 2026 current.",
      "inLanguage": "en-US",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://myicdcode.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      },
      "publisher": {
        "@type": "Organization",
        "name": "StormGlass Interactive Inc.",
        "url": "https://stormglassinteractive.com",
        "email": "support@stormglassinteractive.com",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "New York",
          "addressRegion": "NY",
          "addressCountry": "US"
        }
      }
    }
    </script>

    <!-- JSON-LD: MedicalWebPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MedicalWebPage",
      "name": "ICD-10-CM Code Lookup",
      "url": "https://myicdcode.com",
      "description": "Lookup and understand ICD-10-CM medical diagnosis codes in plain English.",
      "medicalAudience": [
        { "@type": "MedicalAudience", "audienceType": "Patient" },
        { "@type": "MedicalAudience", "audienceType": "Clinician" }
      ],
      "about": {
        "@type": "MedicalCode",
        "codeSystem": "ICD-10-CM"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
